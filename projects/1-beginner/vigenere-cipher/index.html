<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vigenère Cipher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="vig">
    <h1>Vigenère Cipher</h1>
    <p class="tagline">Encrypt a message with a keyword, then decrypt it back.</p>

    <form id="form" class="grid" novalidate>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" rows="3" autocomplete="off" spellcheck="false"
                  placeholder="Attack at dawn">Attack at dawn</textarea>
      </div>

      <div class="field">
        <label for="key">Keyword</label>
        <input id="key" type="text" value="LEMON" autocomplete="off" spellcheck="false"
               placeholder="LEMON" aria-describedby="keyhint" />
        <span id="keyhint" class="hint">Only letters are used from the keyword.</span>
      </div>

      <div class="actions">
        <button type="submit" id="encrypt" class="btn btn-primary">Encrypt</button>
        <button type="button" id="decrypt" class="btn btn-ghost" disabled>Decrypt</button>
        <button type="button" id="compare" class="btn btn-ghost" hidden>Compare</button>
      </div>
    </form>

    <div class="output">
      <label id="resultLabel" for="result">Result</label>
      <div id="result" class="result" role="status" aria-live="polite"
           aria-labelledby="resultLabel">
        <span class="placeholder">Type a message and a keyword, then press Encrypt.</span>
      </div>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
