<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="newtab.css" />
  </head>
  <body>
    <main class="ntp">
      <div class="clock" id="clock">00:00</div>
      <div class="greet" id="greet">Hello</div>

      <div class="shortcuts">
        <a class="chip" href="https://mail.google.com">Mail</a>
        <a class="chip" href="https://github.com">GitHub</a>
        <a class="chip" href="https://developer.chrome.com/docs/extensions">Docs</a>
        <a class="chip" href="https://news.ycombinator.com">News</a>
      </div>

      <button class="palette-btn" id="palette-btn" title="Change theme">🎨</button>

      <div class="palette-tray" id="tray" hidden></div>
    </main>
    <script src="newtab.js"></script>
  </body>
</html>
